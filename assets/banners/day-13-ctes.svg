<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <!-- V9: Split-tone gradient -->
    <linearGradient id="fbg" x1="400" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </linearGradient>
    <!-- V8: Glow filter -->
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- V9: Split-tone background -->
  <rect width="800" height="200" rx="12" fill="url(#fbg)"/>
  <!-- V8: Glow border -->
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <!-- V10: Corner dot grid -->
  <circle cx="640" cy="16" r="2" fill="#dc2626" opacity="0.12"/><circle cx="660" cy="16" r="2" fill="#dc2626" opacity="0.15"/><circle cx="680" cy="16" r="2" fill="#dc2626" opacity="0.18"/><circle cx="700" cy="16" r="2" fill="#dc2626" opacity="0.22"/><circle cx="720" cy="16" r="2" fill="#dc2626" opacity="0.26"/><circle cx="740" cy="16" r="2" fill="#dc2626" opacity="0.3"/><circle cx="760" cy="16" r="2" fill="#dc2626" opacity="0.35"/><circle cx="780" cy="16" r="2" fill="#dc2626" opacity="0.4"/>
  <circle cx="660" cy="36" r="2" fill="#dc2626" opacity="0.1"/><circle cx="680" cy="36" r="2" fill="#dc2626" opacity="0.14"/><circle cx="700" cy="36" r="2" fill="#dc2626" opacity="0.18"/><circle cx="720" cy="36" r="2" fill="#dc2626" opacity="0.22"/><circle cx="740" cy="36" r="2" fill="#dc2626" opacity="0.26"/><circle cx="760" cy="36" r="2" fill="#dc2626" opacity="0.3"/><circle cx="780" cy="36" r="2" fill="#dc2626" opacity="0.35"/>
  <circle cx="680" cy="56" r="2" fill="#dc2626" opacity="0.08"/><circle cx="700" cy="56" r="2" fill="#dc2626" opacity="0.12"/><circle cx="720" cy="56" r="2" fill="#dc2626" opacity="0.16"/><circle cx="740" cy="56" r="2" fill="#dc2626" opacity="0.2"/><circle cx="760" cy="56" r="2" fill="#dc2626" opacity="0.24"/><circle cx="780" cy="56" r="2" fill="#dc2626" opacity="0.28"/>
  <circle cx="700" cy="76" r="2" fill="#dc2626" opacity="0.08"/><circle cx="720" cy="76" r="2" fill="#dc2626" opacity="0.12"/><circle cx="740" cy="76" r="2" fill="#dc2626" opacity="0.16"/><circle cx="760" cy="76" r="2" fill="#dc2626" opacity="0.2"/><circle cx="780" cy="76" r="2" fill="#dc2626" opacity="0.24"/>
  <circle cx="720" cy="96" r="2" fill="#dc2626" opacity="0.06"/><circle cx="740" cy="96" r="2" fill="#dc2626" opacity="0.1"/><circle cx="760" cy="96" r="2" fill="#dc2626" opacity="0.14"/><circle cx="780" cy="96" r="2" fill="#dc2626" opacity="0.18"/>
  <!-- V4: Left badge (DAY instead of WEEK) -->
  <rect x="24" y="24" width="72" height="72" rx="10" fill="#dc2626"/>
  <text x="60" y="52" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" text-anchor="middle">DAY</text>
  <text x="60" y="78" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">13</text>
  <!-- Title -->
  <text x="118" y="46" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">CTEs (Part 1)</text>
  <!-- Difficulty pill -->
  <text x="118" y="70" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#f59e0b">Intermediate</text>
  <!-- Bullet list - left aligned under badge -->
  <text x="118" y="96" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c4a0a6">What you'll learn:</text>
  <circle cx="126" cy="108" r="3" fill="#ef4444"/>
  <text x="138" y="112" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#fce4ec">WITH clause</text>
  <circle cx="126" cy="130" r="3" fill="#ef4444"/>
  <text x="138" y="134" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#fce4ec">Named subqueries</text>
  <circle cx="126" cy="152" r="3" fill="#ef4444"/>
  <text x="138" y="156" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#fce4ec">Multi-step CTEs</text>
  <circle cx="126" cy="174" r="3" fill="#ef4444"/>
  <text x="138" y="178" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#fce4ec">Readability</text>
</svg>