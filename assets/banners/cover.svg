<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" fill="none">
  <defs>
    <linearGradient id="cbg" x1="450" y1="0" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- V9: Split-tone background -->
  <rect width="900" height="180" rx="14" fill="url(#cbg)"/>

  <!-- V8: Glow border -->
  <rect x="1" y="1" width="898" height="178" rx="14" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>

  <!-- V10: Corner dot grid -->
  <circle cx="720" cy="20" r="2.5" fill="#dc2626" opacity="0.12"/><circle cx="744" cy="20" r="2.5" fill="#dc2626" opacity="0.15"/><circle cx="768" cy="20" r="2.5" fill="#dc2626" opacity="0.18"/><circle cx="792" cy="20" r="2.5" fill="#dc2626" opacity="0.22"/><circle cx="816" cy="20" r="2.5" fill="#dc2626" opacity="0.26"/><circle cx="840" cy="20" r="2.5" fill="#dc2626" opacity="0.3"/><circle cx="864" cy="20" r="2.5" fill="#dc2626" opacity="0.35"/><circle cx="880" cy="20" r="2.5" fill="#dc2626" opacity="0.4"/>
  <circle cx="744" cy="44" r="2.5" fill="#dc2626" opacity="0.1"/><circle cx="768" cy="44" r="2.5" fill="#dc2626" opacity="0.14"/><circle cx="792" cy="44" r="2.5" fill="#dc2626" opacity="0.18"/><circle cx="816" cy="44" r="2.5" fill="#dc2626" opacity="0.22"/><circle cx="840" cy="44" r="2.5" fill="#dc2626" opacity="0.26"/><circle cx="864" cy="44" r="2.5" fill="#dc2626" opacity="0.3"/><circle cx="880" cy="44" r="2.5" fill="#dc2626" opacity="0.35"/>
  <circle cx="768" cy="68" r="2.5" fill="#dc2626" opacity="0.08"/><circle cx="792" cy="68" r="2.5" fill="#dc2626" opacity="0.12"/><circle cx="816" cy="68" r="2.5" fill="#dc2626" opacity="0.16"/><circle cx="840" cy="68" r="2.5" fill="#dc2626" opacity="0.2"/><circle cx="864" cy="68" r="2.5" fill="#dc2626" opacity="0.24"/><circle cx="880" cy="68" r="2.5" fill="#dc2626" opacity="0.28"/>
  <circle cx="792" cy="92" r="2.5" fill="#dc2626" opacity="0.08"/><circle cx="816" cy="92" r="2.5" fill="#dc2626" opacity="0.12"/><circle cx="840" cy="92" r="2.5" fill="#dc2626" opacity="0.16"/><circle cx="864" cy="92" r="2.5" fill="#dc2626" opacity="0.2"/><circle cx="880" cy="92" r="2.5" fill="#dc2626" opacity="0.24"/>
  <circle cx="816" cy="116" r="2.5" fill="#dc2626" opacity="0.06"/><circle cx="840" cy="116" r="2.5" fill="#dc2626" opacity="0.1"/><circle cx="864" cy="116" r="2.5" fill="#dc2626" opacity="0.14"/><circle cx="880" cy="116" r="2.5" fill="#dc2626" opacity="0.18"/>

  <!-- V4: Badge -->
  <rect x="32" y="32" width="100" height="100" rx="14" fill="#dc2626"/>
  <text x="82" y="70" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#fca5a5" text-anchor="middle">SQL</text>
  <text x="82" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">30</text>

  <!-- Title + subtitle -->
  <text x="160" y="76" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff">30 Day SQL Challenge</text>
  <text x="160" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="#c4a0a6">From zero to SQL confident. Daily lessons, real data, real exercises.</text>
</svg>
