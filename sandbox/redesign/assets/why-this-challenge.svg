<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="wcbg" x1="400" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background + glow -->
  <rect width="800" height="200" rx="12" fill="url(#wcbg)"/>
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.35" filter="url(#glow3)"/>

  <!-- Corner dots -->
  <circle cx="720" cy="16" r="2" fill="#dc2626" opacity="0.2"/><circle cx="740" cy="16" r="2" fill="#dc2626" opacity="0.25"/><circle cx="760" cy="16" r="2" fill="#dc2626" opacity="0.3"/><circle cx="780" cy="16" r="2" fill="#dc2626" opacity="0.35"/>
  <circle cx="740" cy="36" r="2" fill="#dc2626" opacity="0.15"/><circle cx="760" cy="36" r="2" fill="#dc2626" opacity="0.2"/><circle cx="780" cy="36" r="2" fill="#dc2626" opacity="0.25"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Why This Challenge?</text>

  <!-- Column 1: Daily Practice -->
  <rect x="40" y="60" width="220" height="120" rx="8" fill="#dc2626" opacity="0.08"/>
  <!-- Calendar icon -->
  <rect x="130" y="72" width="24" height="22" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="136" y1="68" x2="136" y2="74" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="148" y1="68" x2="148" y2="74" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="130" y1="80" x2="154" y2="80" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="150" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Daily Practice</text>
  <text x="150" y="134" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">30 minutes a day builds</text>
  <text x="150" y="150" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">more skill than a weekend</text>
  <text x="150" y="166" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">bootcamp you forget</text>

  <!-- Column 2: Real Data -->
  <rect x="290" y="60" width="220" height="120" rx="8" fill="#dc2626" opacity="0.08"/>
  <!-- Table icon -->
  <rect x="380" y="72" width="24" height="18" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="380" y1="78" x2="404" y2="78" stroke="#ef4444" stroke-width="1"/>
  <line x1="380" y1="84" x2="404" y2="84" stroke="#ef4444" stroke-width="1"/>
  <line x1="392" y1="72" x2="392" y2="90" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Real Data</text>
  <text x="400" y="134" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">Every day uses a fresh dataset</text>
  <text x="400" y="150" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">you build and query yourself.</text>
  <text x="400" y="166" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">No toy examples</text>

  <!-- Column 3: Career-Ready -->
  <rect x="540" y="60" width="220" height="120" rx="8" fill="#dc2626" opacity="0.08"/>
  <!-- Briefcase icon -->
  <rect x="632" y="74" width="22" height="16" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="638" y="68" width="10" height="8" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="650" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Career-Ready</text>
  <text x="650" y="134" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">Exercises modelled on real</text>
  <text x="650" y="150" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">work: logistics, healthcare,</text>
  <text x="650" y="166" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">finance, infrastructure</text>
</svg>
