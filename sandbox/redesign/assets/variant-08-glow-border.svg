<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" fill="none">
  <!-- V8: Subtle red glow border all around -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="120" rx="12" fill="#1a0a0e"/>
  <rect x="1" y="1" width="798" height="118" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <text x="40" y="44" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" letter-spacing="2">WEEK 1</text>
  <text x="40" y="76" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">SQL Fundamentals</text>
  <text x="40" y="100" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#c4a0a6">Days 1-7  |  SELECT, WHERE, ORDER BY, GROUP BY, INSERT/UPDATE/DELETE, Keys, Project</text>
</svg>
