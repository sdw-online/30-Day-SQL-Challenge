<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="dtbg" x1="400" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background + glow border -->
  <rect width="800" height="420" rx="12" fill="url(#dtbg)"/>
  <rect x="1" y="1" width="798" height="418" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>

  <!-- Corner dots -->
  <circle cx="700" cy="16" r="2" fill="#dc2626" opacity="0.2"/><circle cx="720" cy="16" r="2" fill="#dc2626" opacity="0.25"/><circle cx="740" cy="16" r="2" fill="#dc2626" opacity="0.3"/><circle cx="760" cy="16" r="2" fill="#dc2626" opacity="0.35"/><circle cx="780" cy="16" r="2" fill="#dc2626" opacity="0.4"/>
  <circle cx="720" cy="36" r="2" fill="#dc2626" opacity="0.15"/><circle cx="740" cy="36" r="2" fill="#dc2626" opacity="0.2"/><circle cx="760" cy="36" r="2" fill="#dc2626" opacity="0.25"/><circle cx="780" cy="36" r="2" fill="#dc2626" opacity="0.3"/>
  <circle cx="740" cy="56" r="2" fill="#dc2626" opacity="0.1"/><circle cx="760" cy="56" r="2" fill="#dc2626" opacity="0.15"/><circle cx="780" cy="56" r="2" fill="#dc2626" opacity="0.2"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Where Should I Start?</text>

  <!-- Q1: Have you written SQL before? -->
  <rect x="260" y="64" width="280" height="44" rx="8" fill="#dc2626" opacity="0.15"/>
  <rect x="260" y="64" width="280" height="44" rx="8" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="91" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Have you written SQL before?</text>

  <!-- No branch (left) -->
  <line x1="330" y1="108" x2="160" y2="155" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">No</text>

  <!-- Result: Day 1 -->
  <rect x="60" y="155" width="200" height="52" rx="8" fill="#dc2626"/>
  <text x="160" y="177" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Start at Day 1</text>
  <text x="160" y="196" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Week 1: SQL Fundamentals</text>

  <!-- Yes branch (right) -->
  <line x1="470" y1="108" x2="580" y2="155" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Yes</text>

  <!-- Q2: Comfortable with GROUP BY + CASE WHEN? -->
  <rect x="430" y="155" width="320" height="44" rx="8" fill="#dc2626" opacity="0.15"/>
  <rect x="430" y="155" width="320" height="44" rx="8" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="590" y="177" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Comfortable with GROUP BY</text>
  <text x="590" y="193" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">and CASE WHEN?</text>

  <!-- No branch (left from Q2) -->
  <line x1="500" y1="199" x2="370" y2="252" stroke="#ef4444" stroke-width="1.5"/>
  <text x="415" y="228" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">No</text>

  <!-- Result: Week 2 -->
  <rect x="250" y="252" width="240" height="52" rx="8" fill="#dc2626"/>
  <text x="370" y="274" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Start at Day 8</text>
  <text x="370" y="293" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Week 2: Data Quality &amp; Transformation</text>

  <!-- Yes branch (right from Q2) -->
  <line x1="680" y1="199" x2="680" y2="252" stroke="#ef4444" stroke-width="1.5"/>
  <text x="695" y="228" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Yes</text>

  <!-- Q3: Can you write JOINs confidently? -->
  <rect x="540" y="252" width="240" height="44" rx="8" fill="#dc2626" opacity="0.15"/>
  <rect x="540" y="252" width="240" height="44" rx="8" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="279" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Can you write JOINs?</text>

  <!-- No branch (left from Q3) -->
  <line x1="590" y1="296" x2="470" y2="350" stroke="#ef4444" stroke-width="1.5"/>
  <text x="510" y="325" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">No</text>

  <!-- Result: Week 3 -->
  <rect x="340" y="350" width="240" height="52" rx="8" fill="#dc2626"/>
  <text x="460" y="372" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Start at Day 15</text>
  <text x="460" y="391" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Week 3: JOINs &amp; Relational Data</text>

  <!-- Yes branch (right from Q3) -->
  <line x1="730" y1="296" x2="730" y2="350" stroke="#ef4444" stroke-width="1.5"/>
  <text x="745" y="325" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Yes</text>

  <!-- Result: Week 4 -->
  <rect x="620" y="350" width="160" height="52" rx="8" fill="#dc2626"/>
  <text x="700" y="372" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Start at Day 22</text>
  <text x="700" y="391" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Week 4: Advanced</text>
</svg>
