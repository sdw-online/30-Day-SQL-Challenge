<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <linearGradient id="aibg" x1="400" y1="0" x2="800" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background + glow -->
  <rect width="800" height="240" rx="12" fill="url(#aibg)"/>
  <rect x="1" y="1" width="798" height="238" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.35" filter="url(#glow4)"/>

  <!-- Corner dots -->
  <circle cx="720" cy="16" r="2" fill="#dc2626" opacity="0.2"/><circle cx="740" cy="16" r="2" fill="#dc2626" opacity="0.25"/><circle cx="760" cy="16" r="2" fill="#dc2626" opacity="0.3"/><circle cx="780" cy="16" r="2" fill="#dc2626" opacity="0.35"/>
  <circle cx="740" cy="36" r="2" fill="#dc2626" opacity="0.15"/><circle cx="760" cy="36" r="2" fill="#dc2626" opacity="0.2"/><circle cx="780" cy="36" r="2" fill="#dc2626" opacity="0.25"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">"But can't AI write SQL for me?"</text>

  <!-- Flow: 3 connected boxes -->

  <!-- Box 1: AI generates -->
  <rect x="40" y="68" width="200" height="80" rx="8" fill="#dc2626" opacity="0.12"/>
  <rect x="40" y="68" width="200" height="80" rx="8" fill="none" stroke="#dc2626" stroke-width="1"/>
  <!-- Robot/AI icon -->
  <rect x="120" y="78" width="20" height="16" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="126" cy="84" r="2" fill="#ef4444"/><circle cx="134" cy="84" r="2" fill="#ef4444"/>
  <text x="140" y="112" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">AI generates SQL</text>
  <text x="140" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">Fast, but often wrong</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="108" x2="295" y2="108" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="295,103 305,108 295,113" fill="#ef4444"/>

  <!-- Box 2: You verify -->
  <rect x="305" y="68" width="200" height="80" rx="8" fill="#dc2626" opacity="0.12"/>
  <rect x="305" y="68" width="200" height="80" rx="8" fill="none" stroke="#dc2626" stroke-width="1"/>
  <!-- Checkmark icon -->
  <circle cx="400" cy="84" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <polyline points="395,84 399,88 406,80" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="405" y="112" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">You verify &amp; debug</text>
  <text x="405" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c4a0a6" text-anchor="middle">Requires SQL fluency</text>

  <!-- Arrow 2 -->
  <line x1="505" y1="108" x2="560" y2="108" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="560,103 570,108 560,113" fill="#ef4444"/>

  <!-- Box 3: Production-ready -->
  <rect x="570" y="68" width="200" height="80" rx="8" fill="#dc2626"/>
  <!-- Rocket icon -->
  <polygon points="670,80 676,92 664,92" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="670" y1="92" x2="670" y2="96" stroke="#ffffff" stroke-width="1.5"/>
  <text x="670" y="116" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Production-ready</text>
  <text x="670" y="134" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Optimised, correct, trusted</text>

  <!-- Bottom insight text -->
  <text x="400" y="182" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">AI makes SQL faster to write. It doesn't make SQL knowledge optional.</text>
  <text x="400" y="204" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c4a0a6" text-anchor="middle">You still need to read it, debug it, optimise it, and know when it's wrong.</text>
  <text x="400" y="224" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c4a0a6" text-anchor="middle">That's what this challenge teaches.</text>
</svg>
